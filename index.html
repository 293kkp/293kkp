<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neomorphic Wall Clock</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* ब्राउन बैकग्राउंड */
            background-color: #8D5524; 
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* नियोमॉर्फिक फुलस्क्रीन बटन */
        #fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background-color: #8D5524;
            color: #f0f0f0;
            border: none;
            border-radius: 12px;
            /* ब्राउन बैकग्राउंड पर नियोमॉर्फिक 3D शैडो */
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.4), 
                       -6px -6px 12px rgba(255, 255, 255, 0.1);
            z-index: 100;
            transition: all 0.2s ease;
        }

        #fullscreen-btn:active {
            /* क्लिक करने पर अंदर की तरफ दबने का इफ़ेक्ट */
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), 
                        inset -4px -4px 8px rgba(255, 255, 255, 0.1);
        }

        /* ग्रीन आउटर रिंग (नियोमॉर्फिक इफ़ेक्ट के साथ) */
        .clock-ring {
            width: 85vmin;
            height: 85vmin;
            background-color: #4CAF50; /* ग्रीन */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* बाहर की तरफ उभरा हुआ 3D इफ़ेक्ट */
            box-shadow: 15px 15px 30px rgba(0, 0, 0, 0.5), 
                       -15px -15px 30px rgba(255, 255, 255, 0.1);
        }

        /* स्काई-ब्लू इनर क्लॉक (अंदर की तरफ धंसा हुआ इफ़ेक्ट) */
        .clock-inner {
            width: 76vmin;
            height: 76vmin;
            background-color: #87CEEB; /* स्काई-ब्लू */
            border-radius: 50%;
            position: relative;
            /* अंदर की तरफ गहराई (Inset shadow) */
            box-shadow: inset 12px 12px 24px rgba(0, 0, 0, 0.25), 
                        inset -12px -12px 24px rgba(255, 255, 255, 0.4);
        }

        /* घड़ी के बीच का 3D बिंदु */
        .clock-inner::after {
            content: '';
            position: absolute;
            width: 4vmin;
            height: 4vmin;
            background-color: #87CEEB;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.3), 
                       -3px -3px 6px rgba(255,255,255,0.5);
        }

        /* 1 से 12 तक के नंबरों का डिज़ाइन */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 5vmin;
            font-weight: 700;
            color: #333;
            /* नंबरों को भी हल्का 3D लुक देने के लिए टेक्स्ट शैडो */
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.6), 
                        -1px -1px 2px rgba(0, 0, 0, 0.1);
        }

        .number div {
            padding-top: 3vmin;
        }

        /* कांटों की सामान्य स्टाइलिंग (परछाई के साथ ताकि वे तैरते हुए दिखें) */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            z-index: 5;
            box-shadow: 2px 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* घंटे का कांटा */
        .hour {
            width: 2.5vmin;
            height: 20vmin;
            background-color: #2c3e50; 
            margin-left: -1.25vmin;
        }

        /* मिनट का कांटा */
        .minute {
            width: 1.5vmin;
            height: 28vmin;
            background-color: #8e44ad; 
            margin-left: -0.75vmin;
        }

        /* सेकंड का कांटा */
        .second {
            width: 0.6vmin;
            height: 33vmin;
            background-color: #e74c3c; 
            margin-left: -0.3vmin;
            z-index: 6;
        }

        /* छोटा फॉन्ट: दिन और तारीख का नियोमॉर्फिक बॉक्स */
        .date-display {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background-color: #87CEEB;
            padding: 1vmin 2.5vmin;
            border-radius: 15px;
            font-size: 2vmin; /* Small font size */
            font-weight: 600;
            color: #444;
            /* बॉक्स को हल्का सा ऊपर उठाने वाला इफ़ेक्ट */
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.15), 
                       -4px -4px 8px rgba(255, 255, 255, 0.4);
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <button id="fullscreen-btn">Toggle Fullscreen</button>

    <div class="clock-ring">
        <div class="clock-inner" id="clock">
            <div id="date-display" class="date-display"></div>
            
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>
    </div>

    <script>
        // 1. घड़ी में 1 से 12 तक के नंबर सेट करना
        const clockInner = document.getElementById('clock');
        for (let i = 1; i <= 12; i++) {
            let numContainer = document.createElement('div');
            numContainer.className = 'number';
            numContainer.style.transform = `rotate(${i * 30}deg)`; 
            
            let numText = document.createElement('div');
            numText.innerText = i;
            // नंबरों को सीधा रखने के लिए वापस उल्टा घुमाना
            numText.style.transform = `rotate(-${i * 30}deg)`; 

            numContainer.appendChild(numText);
            clockInner.appendChild(numContainer);
        }

        // 2. घड़ी के कांटे और तारीख का लॉजिक
        const hourHand = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const secondHand = document.getElementById('second');
        const dateDisplay = document.getElementById('date-display');

        function setClock() {
            const currentDate = new Date();
            
            const secondsRatio = currentDate.getSeconds() / 60;
            const minutesRatio = (secondsRatio + currentDate.getMinutes()) / 60;
            const hoursRatio = (minutesRatio + currentDate.getHours()) / 12;

            setRotation(secondHand, secondsRatio);
            setRotation(minuteHand, minutesRatio);
            setRotation(hourHand, hoursRatio);

            // दिन और तारीख अंग्रेजी में (Small format)
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: '2-digit' };
            dateDisplay.innerText = currentDate.toLocaleDateString('en-US', options);
        }

        function setRotation(element, rotationRatio) {
            element.style.transform = `rotate(${rotationRatio * 360}deg)`;
        }

        setInterval(setClock, 1000);
        setClock();

        // 3. फुलस्क्रीन बटन का लॉजिक
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.style.display = 'none';
            } else {
                fullscreenBtn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
