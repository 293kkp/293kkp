<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EURUSD DNA - LIVE ENGINE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400;500;600;700;800&display=swap');

:root{
  --bg-primary:#0D1117;
  --bg-secondary:#161B22;
  --border-medium:#30363D;
  --text-secondary:#8B949E;
  --status-live:#2ECC71;
  --status-offline:#FF4757;
}

*{margin:0;padding:0;box-sizing:border-box}

body,html{
  background:var(--bg-primary);
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family: 'JetBrains Mono', monospace;
  touch-action:none;
}

/* HIDDEN UI - Display Only View */
#ui{ display: none !important; }

canvas{
  display:block;
  background:var(--bg-primary);
}

#indexPanel{
  position:fixed;
  right:0;
  width:75px;
  background:var(--bg-secondary);
  border-left:1px solid var(--border-medium);
  z-index:999;
}

.index-cell{
  position:absolute;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:8.5px; 
  font-weight:300; 
  color:rgba(139, 148, 158, 0.8); 
  border-bottom:1px solid #21262D;
  background:var(--bg-secondary);
  font-family: 'JetBrains Mono';
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div id="ui">
    <div id="status" class="status">OFFLINE</div>
</div>

<canvas id="matrixCanvas"></canvas>
<div id="indexPanel"></div>

<script>
// --- LIVE AUDIO ENGINE LOGIC ---
let audioCtx = null;
let beepInterval = null;
let trackingState = 'IDLE'; 

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Attempt to start audio context automatically (Works in OBS/Unlocked browsers)
try { getAudioCtx(); } catch(e) {}

// Fallback: unlock audio context on first click for standard browsers
document.body.addEventListener('pointerdown', () => {
  getAudioCtx();
}, { once: true });

function playTone(freq, type, dur, vol) {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + dur + 0.1);
  } catch(e) {}
}

function startNormalBeep() {
  stopBeep();
  playTone(600, 'square', 0.15, 0.7);
  beepInterval = setInterval(() => playTone(600, 'square', 0.15, 0.7), 800); 
}

function startIntenseBeep() {
  stopBeep();
  playTone(950, 'sawtooth', 0.1, 0.8);
  beepInterval = setInterval(() => playTone(950, 'sawtooth', 0.1, 0.8), 150); 
}

function stopBeep() {
  if (beepInterval) { clearInterval(beepInterval); beepInterval = null; }
}

function playWinSound() {
  stopBeep();
  setTimeout(() => playTone(523.25, 'square', 0.15, 0.8), 0);   
  setTimeout(() => playTone(659.25, 'square', 0.15, 0.8), 150); 
  setTimeout(() => playTone(783.99, 'square', 0.20, 0.8), 300); 
  setTimeout(() => playTone(1046.50, 'square', 0.60, 0.8), 450); 
}

function playLossSound() {
  stopBeep();
  setTimeout(() => playTone(200, 'sawtooth', 0.3, 0.9), 0);
  setTimeout(() => playTone(130, 'sawtooth', 0.7, 0.9), 300);
}

// --- FFT MATRIX LOGIC (LIVE ONLY) ---
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d',{alpha:false});
const SYMBOL = "frxEURUSD", TOKEN = "TpVIBWpqet5X8AH", DERIV_WS = "wss://ws.derivws.com/websockets/v3?app_id=1089";
let wsConnection = null;
let matrixData = {}, currentColumn = 0, cameraX = 0, isFollowing = true;
const CELL_W = 35, TOTAL_ROWS = 132, MAX_COLS = 7200, MARGIN_RIGHT = 75; 
let CELL_H = 16;
const pad = (n,s=2) => String(n).padStart(s,'0');

// PADDING AND COMPACT LAYOUT CONFIG
const TOP_PAD = 1;
const BOTTOM_PAD = 4;
const BOTTOM_AXIS_H = 12;

function getWeekProgress(){
  const now = new Date();
  const day = now.getDay();
  const secsToday = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
  return Math.max(0, (day === 0) ? (6 * 86400) + secsToday : ((day - 1) * 86400) + secsToday);
}

function handleTick(tick){
  const s = getWeekProgress(); 
  currentColumn = Math.floor(s/TOTAL_ROWS)%MAX_COLS; 
  let ticksInCurrentCycle = s%TOTAL_ROWS;
  const p = tick.quote, r = ticksInCurrentCycle;
  
  if(!matrixData[currentColumn]) matrixData[currentColumn]={};
  const prevC = currentColumn>0 ? currentColumn-1 : MAX_COLS-1;
  let col='G', stk=1;
  
  if(matrixData[prevC] && matrixData[prevC][r]){
    const old = matrixData[prevC][r];
    if (p > old.p)      { col = 'G'; stk = (old.c === 'G' ? old.s + 1 : 1); }
    else if (p < old.p) { col = 'R'; stk = (old.c === 'R' ? old.s + 1 : 1); }
    else                { col = old.c; stk = 0; }
  }
  matrixData[currentColumn][r]={c:col, s:stk, p:p};

  // Live Audio Engine Processing for Row 130
  if (r === 130 && !tick.isHistory) {
    if (trackingState === 'IDLE') {
      if (col === 'G' && stk === 2) { trackingState = 'WAIT_X3'; startNormalBeep(); }
    } 
    else if (trackingState === 'WAIT_X3') {
      if (col === 'G' && stk === 3) { trackingState = 'WAIT_X4'; startIntenseBeep(); } 
      else { stopBeep(); trackingState = 'IDLE'; if (col === 'G' && stk === 2) { trackingState = 'WAIT_X3'; startNormalBeep(); } }
    } 
    else if (trackingState === 'WAIT_X4') {
      if (col === 'R' && stk === 1) { playWinSound(); trackingState = 'IDLE'; } 
      else if (col === 'G' && stk === 4) { playLossSound(); trackingState = 'IDLE'; } 
      else { stopBeep(); trackingState = 'IDLE'; }
    }
  }

  updatePanels(); 
  if(isFollowing) jumpToCurrent();
}

function updatePanels(){
  let hI='';
  for(let r=0; r<TOTAL_ROWS; r++){
    hI+=`<div class="index-cell" style="top:${r*CELL_H}px;height:${CELL_H}px">${pad(r, 3)}_${pad(r, 3)}</div>`;
  }
  document.getElementById('indexPanel').innerHTML=hI;
}

function jumpToCurrent(){ cameraX = Math.max(0, (currentColumn*CELL_W)-(window.innerWidth-MARGIN_RIGHT-CELL_W)); }

window.onresize = () => { 
  const dpr = window.devicePixelRatio||1; 
  const canvasH = window.innerHeight - TOP_PAD - BOTTOM_PAD;
  
  canvas.width = window.innerWidth*dpr; 
  canvas.height = canvasH*dpr;
  canvas.style.width = window.innerWidth+'px'; 
  canvas.style.height = canvasH+'px';
  canvas.style.marginTop = TOP_PAD+'px';
  
  ctx.scale(dpr,dpr); 
  
  CELL_H = (canvasH - BOTTOM_AXIS_H)/TOTAL_ROWS;
  
  const indexPanel = document.getElementById('indexPanel');
  indexPanel.style.top = TOP_PAD + 'px';
  indexPanel.style.height = (canvasH - BOTTOM_AXIS_H) + 'px';
};

function connect(){
  wsConnection = new WebSocket(DERIV_WS);
  wsConnection.onopen = () => { wsConnection.send(JSON.stringify({authorize:TOKEN})); };
  wsConnection.onmessage = (m) => { 
    const d = JSON.parse(m.data); 
    if(d.authorize){ 
        const sEl = document.getElementById('status');
        if(sEl) sEl.classList.add('live'); 
        wsConnection.send(JSON.stringify({ticks:SYMBOL,subscribe:1})); 
    } 
    if(d.tick) handleTick({...d.tick, isHistory: false}); 
  };
  wsConnection.onclose = () => { 
      const sEl = document.getElementById('status');
      if(sEl) sEl.classList.remove('live'); 
      setTimeout(connect, 3000); 
  };
}

function draw(){
  ctx.fillStyle='#0D1117'; ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
  const now=new Date();
  const day=now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const startOfISTWeek = new Date(now.setDate(diff));
  startOfISTWeek.setHours(0,0,0,0);
  
  ctx.save(); 
  ctx.translate(-cameraX,0);
  let sC=Math.max(0,Math.floor(cameraX/CELL_W)), eC=Math.min(MAX_COLS-1,Math.floor((cameraX+window.innerWidth)/CELL_W)+1);
  
  ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
  ctx.fillRect(sC*CELL_W, 130*CELL_H, (eC-sC+1)*CELL_W, CELL_H);

  for(let r=0; r<=TOTAL_ROWS; r++){ 
    ctx.beginPath(); 
    if(r === 130 || r === 131) {
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1; 
    } else {
      ctx.strokeStyle = '#21262D'; ctx.lineWidth = 1;
    }
    ctx.moveTo(sC*CELL_W, r*CELL_H); 
    ctx.lineTo((eC+1)*CELL_W, r*CELL_H); 
    ctx.stroke(); 
  }
  ctx.strokeStyle = '#21262D'; ctx.lineWidth = 1;
  for(let c=sC; c<=eC+1; c++){ ctx.beginPath(); ctx.moveTo(c*CELL_W, 0); ctx.lineTo(c*CELL_W, TOTAL_ROWS*CELL_H); ctx.stroke(); }
  
  for(let a=sC; a<=eC; a++){
    let x=a*CELL_W;
    if(matrixData[a]) Object.keys(matrixData[a]).forEach(r=>{
      const d=matrixData[a][r];
      const p=1.5;

      ctx.save();
      // Draw background boxes only (No text)
      if (d.s === 0) {
        ctx.fillStyle = '#E8E8E8'; ctx.fillRect(x+p, r*CELL_H+p, CELL_W-(p*2), CELL_H-(p*2));
      } else {
        ctx.fillStyle = d.c==='R' ? '#FF4757' : '#2ECC71'; ctx.fillRect(x+p, r*CELL_H+p, CELL_W-(p*2), CELL_H-(p*2));
      }
      ctx.restore();
    });
  }

  ctx.restore();
  
  // DRAW SHRINKED BOTTOM AXIS
  ctx.fillStyle = '#161B22'; 
  ctx.fillRect(0, TOTAL_ROWS * CELL_H, window.innerWidth, BOTTOM_AXIS_H);
  ctx.strokeStyle = '#30363D'; 
  ctx.beginPath();
  ctx.moveTo(0, TOTAL_ROWS * CELL_H);
  ctx.lineTo(window.innerWidth, TOTAL_ROWS * CELL_H);
  ctx.stroke();

  ctx.save();
  ctx.translate(-cameraX, 0);
  ctx.fillStyle='#8B949E'; 
  ctx.font='300 8.5px "JetBrains Mono"'; 
  ctx.textAlign='center'; 
  ctx.textBaseline='middle'; 
  for(let a=sC; a<=eC; a++){
    if (a <= currentColumn) { 
      let x=a*CELL_W;
      const lD=new Date(startOfISTWeek.getTime()+(a * TOTAL_ROWS * 1000));
      ctx.fillText(`${pad(lD.getHours())}:${pad(lD.getMinutes())}`, x+CELL_W/2, (TOTAL_ROWS*CELL_H) + (BOTTOM_AXIS_H / 2));
    }
  }
  ctx.restore(); 
  requestAnimationFrame(draw);
}

window.onresize(); connect(); draw();
</script>
</body>
</html>
